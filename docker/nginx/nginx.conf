# Top-level nginx config.
# Real per-host blocks live in conf.d/*.conf.

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # log to stdout/stderr — let docker handle log shipping
    log_format main '$remote_addr - $remote_user [$time_iso8601] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'ut=$upstream_response_time';
    access_log /dev/stdout main;
    error_log  /dev/stderr warn;

    sendfile        on;
    keepalive_timeout  65;

    # gzip text content (HTML / JSON / JS / CSS)
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript
                      image/svg+xml;

    # security headers (light, expand under real TLS)
    server_tokens     off;
    client_max_body_size 16M;
    proxy_read_timeout   90s;
    proxy_send_timeout   90s;
    proxy_connect_timeout 10s;

    upstream horizon_web {
        # name resolves via the docker DNS, matches the service name in compose
        server web:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
