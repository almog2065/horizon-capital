# Single virtual host for the firm UI + API.
# Drop a sibling file for TLS (server { listen 443 ssl; ... }) when
# certificates are available.

server {
    listen 80 default_server;
    server_name _;

    # ---- Health (terminates at nginx) ----
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ---- Static assets (passthrough; firm serves its own /static) ----
    location /static/ {
        proxy_pass http://horizon_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ---- Everything else → app ----
    location / {
        proxy_pass http://horizon_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_redirect off;
    }

    # ---- Metrics endpoint — restrict to internal network ----
    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://horizon_web;
    }
}
