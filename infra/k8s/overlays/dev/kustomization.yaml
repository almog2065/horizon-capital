apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: horizon-capital-dev

resources:
  - ../../base

commonLabels:
  environment: dev

# Same tag as `docker compose build` (horizon-capital:latest). Load into kind before apply.
images:
  - name: horizon-capital
    newTag: latest

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests: { cpu: 100m, memory: 192Mi }
          limits:   { cpu: 500m, memory: 512Mi }
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
    target:
      kind: Deployment
      name: web

  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
    target:
      kind: Deployment
      name: worker

  - patch: |-
      - op: replace
        path: /data/APP_ENV
        value: "dev"
      - op: replace
        path: /data/LOG_LEVEL
        value: "DEBUG"
      - op: replace
        path: /data/LOG_FORMAT
        value: "text"
    target:
      kind: ConfigMap
      name: horizon-config

  # kind/local: one web pod is enough; base HPA minReplicas=2 causes extra pending pods.
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2
    target:
      kind: HorizontalPodAutoscaler
      name: web
