apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: horizon-capital

resources:
  - ../../base

commonLabels:
  environment: prod

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests: { cpu: 500m, memory: 512Mi }
          limits:   { cpu: 2,    memory: 2Gi }
    target:
      kind: Deployment
      name: web

images:
  - name: horizon-capital
    newTag: prod
