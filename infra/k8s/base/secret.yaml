# Placeholder Secret — real values must be injected by ExternalSecrets /
# Vault / SealedSecrets in production. Never commit real values.
#
# Generate locally with:
#   kubectl -n horizon-capital create secret generic horizon-secrets \
#     --from-literal=OPENAI_API_KEY=$OPENAI_API_KEY \
#     --from-literal=POSTGRES_PASSWORD=changeme \
#     --from-literal=LANGSMITH_API_KEY=$LANGSMITH_API_KEY \
#     --dry-run=client -o yaml > infra/k8s/base/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: horizon-secrets
type: Opaque
stringData:
  OPENAI_API_KEY: ""          # populated via External Secrets in real clusters
  LANGSMITH_API_KEY: ""
  POSTGRES_PASSWORD: "horizon" # demo default — rotate in real deploys
