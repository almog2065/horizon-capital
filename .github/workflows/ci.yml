name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.5.7
      - name: Ruff
        run: ruff check app tests evals

  test:
    name: pytest
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        ports: ["5432:5432"]
        env:
          POSTGRES_USER: horizon
          POSTGRES_PASSWORD: horizon
          POSTGRES_DB: horizon
        options: >-
          --health-cmd "pg_isready -U horizon"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Pytest
        env:
          DATABASE_URL: postgresql+psycopg://horizon:horizon@localhost:5432/horizon
          REDIS_URL: redis://localhost:6379/0
          USE_MOCK_LLM: "1"
          LOG_FORMAT: text
        run: pytest -q tests/

  eval-replay:
    name: eval harness (sample day)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run eval replay
        env:
          USE_MOCK_LLM: "1"
        run: |
          python -m evals.run --window sample --out evals/output/ci.json \
            --fail-on grounded_ratio:0.75 \
            --fail-on decision_quality:0.70 \
            --fail-on guardrail_breaches:0
      - uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/output/ci.json

  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: horizon-capital:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke
        run: |
          docker run --rm \
            -e USE_MOCK_LLM=1 \
            -e LOG_FORMAT=text \
            horizon-capital:ci \
            python -c "from app.api.app_factory import app; print('routes', len(app.routes))"
