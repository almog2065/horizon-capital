name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      environment:
        description: target environment
        required: true
        default: dev
        type: choice
        options: [dev, prod]

permissions:
  contents: read
  id-token: write   # for OIDC into AWS
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/horizon-capital-ci
          aws-region: us-east-1

      - name: Login ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.ecr.outputs.registry }}/horizon-capital:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/horizon-capital:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ecs:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v6
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/horizon-capital-ci
          aws-region: us-east-1
      - name: Force new ECS deployment
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          aws ecs update-service \
            --cluster "horizon-${ENV}-cluster" \
            --service "horizon-${ENV}-web" \
            --force-new-deployment
          aws ecs update-service \
            --cluster "horizon-${ENV}-cluster" \
            --service "horizon-${ENV}-worker" \
            --force-new-deployment
      - name: Wait for stability
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          aws ecs wait services-stable \
            --cluster "horizon-${ENV}-cluster" \
            --services "horizon-${ENV}-web" "horizon-${ENV}-worker"
